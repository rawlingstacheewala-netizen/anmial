<!DOCTYPE html>
<html>
<head>
  <title>My Animal Fact File</title>
  <style>

    /* Page background — sets the colour and font for the whole page */
    body {
      background-color: darkgreen;
      font-family: Arial, sans-serif;
    }

    /* Box Model — width sets the content area
       padding pushes the text away from the edges
       border draws a visible frame around the fact file
       margin pushes the fact file away from the screen edge */
    .fact-file {
      background-color: lightyellow;
      color: darkslategray;
      width: 260px;
      padding: 25px;
      border: 4px solid forestgreen;
      margin: 30px;
    }

    /* Animal name — forestgreen so it stands out */
    .animal-name {
      color: forestgreen;
      font-size: 22px;
    }

    /* Detail rows — dark text on the light background */
    .detail {
      color: darkslategray;
    }

    /* Cool fact — orange and italic to make it feel special */
    .cool-fact {
      color: darkorange;
      font-style: italic;
    }

  </style>
</head>
<body>

  <div class="fact-file">
    <h2 class="animal-name">Snow Leopard</h2>
    <p class="detail">Type:fishs</p>
    <p class="detail">Lives in: oceans and lakes</p>
    <p class="detail">Diet:tuna, dog, and other fishs</p>
    <p class="cool-fact">Cool Fact: some can fly !</p>
  </div>

</body>
</html>
